# adsentice · infra local (Redis OODA + Qdrant KG)
# ISOLADO do EVO-API: portas, volumes, namespaces e tags separados.
# Recursos: ~40-80 MB RAM total (Redis ~10 MB + Qdrant ~30-70 MB).

services:
  redis-adsentice:
    image: redis:7.4-alpine
    container_name: adsentice-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6396:6379"
    volumes:
      - ./.data/redis-adsentice:/data
    command: >
      redis-server
        --save 900 1
        --save 300 10
        --save 60 10000
        --maxmemory 64mb
        --maxmemory-policy allkeys-lru
        --databases 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - adsentice-net
    labels:
      com.adsentice.role: "brain"
      com.adsentice.service: "redis-ooda"

  qdrant-adsentice:
    image: qdrant/qdrant:v1.13.6
    container_name: adsentice-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6352:6333"
      - "127.0.0.1:6353:6334"
    volumes:
      - ./.data/qdrant-adsentice:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__STORAGE__SNAPSHOTS_PATH: /qdrant/storage/snapshots
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - adsentice-net
    labels:
      com.adsentice.role: "brain"
      com.adsentice.service: "qdrant-kg"

networks:
  adsentice-net:
    name: adsentice-net
    driver: bridge
